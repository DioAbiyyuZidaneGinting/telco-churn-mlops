name: CI — MLflow Training & Docker Push

on:
  push:
    branches: [main, master]
    paths:
      - "MLProject/**"
      - "modelling.py"
      - "telco_churn_preprocessed.csv"
  workflow_dispatch:

env:
  DOCKER_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/telco-churn-mlflow
  DOCKER_TAG: ${{ github.sha }}

jobs:
  train-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: "1. Checkout repository"
        uses: actions/checkout@v4

      - name: "2. Setup Python 3.12"
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: "3. Install dependencies"
        run: |
          python -m pip install --upgrade pip
          pip install mlflow==2.19.0 scikit-learn==1.5.0 \
                      pandas==2.2.2 numpy==1.26.4 \
                      matplotlib==3.9.0 seaborn==0.13.2

      - name: "4. Run MLflow Project"
        env:
          MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_TRACKING_URI }}
          MLFLOW_TRACKING_USERNAME: ${{ secrets.MLFLOW_TRACKING_USERNAME }}
          MLFLOW_TRACKING_PASSWORD: ${{ secrets.MLFLOW_TRACKING_PASSWORD }}
        run: |
          mlflow run MLProject/ -P data_path=telco_churn_preprocessed.csv -P n_estimators=100 -P max_depth=10 --env-manager=local

      - name: "5. Upload training artifacts"
        uses: actions/upload-artifact@v4
        with:
          name: mlflow-artifacts-${{ github.sha }}
          path: |
            mlruns/
            *.png
            *.log
          retention-days: 30

      - name: "6. Set up Docker Buildx"
        uses: docker/setup-buildx-action@v3

      - name: "7. Login to Docker Hub"
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: "8. Build Docker image with MLflow"
        env:
          MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_TRACKING_URI }}
          MLFLOW_TRACKING_USERNAME: ${{ secrets.MLFLOW_TRACKING_USERNAME }}
          MLFLOW_TRACKING_PASSWORD: ${{ secrets.MLFLOW_TRACKING_PASSWORD }}
        run: |
          mlflow models build-docker \
            --model-uri "models:/telco-churn-rf-mlproject/latest" \
            --name ${{ env.DOCKER_IMAGE }}

      - name: "9. Push Docker image to Docker Hub"
        run: |
          docker tag ${{ env.DOCKER_IMAGE }} ${{ env.DOCKER_IMAGE }}:${{ env.DOCKER_TAG }}
          docker tag ${{ env.DOCKER_IMAGE }} ${{ env.DOCKER_IMAGE }}:latest
          docker push ${{ env.DOCKER_IMAGE }}:${{ env.DOCKER_TAG }}
          docker push ${{ env.DOCKER_IMAGE }}:latest
          echo "✅ Image pushed: ${{ env.DOCKER_IMAGE }}:latest"
