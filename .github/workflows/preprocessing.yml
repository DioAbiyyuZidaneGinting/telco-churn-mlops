name: Preprocessing Pipeline

on:
  push:
    branches: [main, master]
    paths:
      - 'automate_dio.py'
      - 'WA_Fn-UseC_-Telco-Customer-Churn.csv'
  workflow_dispatch:

jobs:
  preprocessing:
    runs-on: ubuntu-latest

    steps:
      - name: "1. Checkout repository"
        uses: actions/checkout@v4

      - name: "2. Setup Python 3.12"
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: "3. Install dependencies"
        run: |
          python -m pip install --upgrade pip
          pip install pandas==2.2.2 numpy==1.26.4 scikit-learn==1.5.0

      - name: "4. Run automate_dio.py"
        run: python automate_dio.py

      - name: "5. Verify output file"
        run: |
          if [ -f "telco_churn_preprocessed.csv" ]; then
            echo "✅ telco_churn_preprocessed.csv created successfully"
            echo "Rows: $(wc -l < telco_churn_preprocessed.csv)"
            echo "Size: $(du -h telco_churn_preprocessed.csv | cut -f1)"
          else
            echo "❌ Output file not found!"
            exit 1
          fi

      - name: "6. Commit and push result"
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add telco_churn_preprocessed.csv preprocessing.log
          git diff --staged --quiet && echo "No changes to commit" || \
            git commit -m "chore: auto-preprocessing result [skip ci]"
          git push
