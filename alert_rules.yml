groups:
  - name: telco-churn-alerts
    interval: 30s
    rules:

      # ── Alert 1: CPU > 80% ────────────────────────────────────────────────
      - alert: HighCPUUsage
        expr: cpu_usage_percent > 80
        for: 2m
        labels:
          severity: warning
          team: mlops
        annotations:
          summary: "CPU usage tinggi pada instance {{ $labels.instance }}"
          description: >
            CPU usage saat ini {{ $value | printf "%.1f" }}%,
            melebihi threshold 80% selama lebih dari 2 menit.
          runbook_url: "https://wiki.example.com/alerts/high-cpu"

      # ── Alert 2: Error Rate > 5% ──────────────────────────────────────────
      - alert: HighErrorRate
        expr: error_rate_percent > 5
        for: 1m
        labels:
          severity: critical
          team: mlops
        annotations:
          summary: "Error rate tinggi pada prediction service"
          description: >
            Error rate saat ini {{ $value | printf "%.1f" }}%,
            melebihi threshold 5%. Periksa log prometheus_exporter.
          runbook_url: "https://wiki.example.com/alerts/high-error-rate"

      # ── Alert 3: Response Time > 1 second ────────────────────────────────
      - alert: SlowResponseTime
        expr: >
          histogram_quantile(0.95,
            rate(response_time_seconds_bucket[5m])
          ) > 1
        for: 2m
        labels:
          severity: warning
          team: mlops
        annotations:
          summary: "Response time P95 melebihi 1 detik"
          description: >
            P95 response time = {{ $value | printf "%.2f" }}s,
            melebihi threshold 1s selama 2 menit terakhir.
          runbook_url: "https://wiki.example.com/alerts/slow-response"
