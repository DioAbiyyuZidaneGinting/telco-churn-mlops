global:
  scrape_interval:     15s
  evaluation_interval: 15s
  scrape_timeout:      10s

alerting:
  alertmanagers:
    - static_configs:
        - targets: ['alertmanager:9093']

rule_files:
  - "alert_rules.yml"

scrape_configs:
  - job_name: 'telco-churn-exporter'
    static_configs:
      - targets: ['localhost:5001']
    metrics_path: /metrics
    scrape_interval: 10s

  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
